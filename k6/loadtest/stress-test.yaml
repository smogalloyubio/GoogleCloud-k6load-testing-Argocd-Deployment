apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: dev
spec:
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        role: k6-tester
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false

      containers:
        - name: k6
          image: rukevweubio/my-load-test:v2
          imagePullPolicy: Always
          args: ["run", "stress.js"]
          env:
            - name: BASE_URL
              value: "http://my-app:3000"
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

      restartPolicy: Never