apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-load-test-scheduled
  namespace: dev
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            role: k6-tester
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            seccompProfile:
              type: RuntimeDefault
          automountServiceAccountToken: false

          containers:
            - name: k6
              image: rukevweubio/my-k6-test:0.51.0
              imagePullPolicy: Always
              args: ["run", "load.js"]
              env:
                - name: BASE_URL
                  value: "http://my-app:3000"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: "250m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"

          restartPolicy: OnFailure