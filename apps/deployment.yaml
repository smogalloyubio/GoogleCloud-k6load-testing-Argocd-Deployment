apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: dev
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: my-app
        image: rukevweubio/mycluster-app:v3
        imagePullPolicy: Always
        ports:
         - name: http
           containerPort: 3000
        env:
          - name: DATA_FILE
            value: "/tmp/data.json"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true 
          capabilities:
            drop:
              - ALL
        volumeMounts:
        # We only mount /tmp. Removing the /app/dist mount fixes the "Module Not Found" error.
        - name: tmp-storage
          mountPath: /tmp
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "120Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: tmp-storage
        emptyDir: {}